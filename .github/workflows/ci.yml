name: portfolio-ci

on:
  push:
    branches: [main, master, upgrade/portfolio-v1]
  pull_request:
    branches: [main, master, upgrade/portfolio-v1]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            "**/*.md"

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Install dependencies
        run: bundle install
      - name: Build Jekyll site
        run: bundle exec jekyll build
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --max-concurrency 5 --root-dir '${{ github.workspace }}/_site' --fallback-extensions html --index-files index.html --exclude 'https://www.linkedin.com/.*' './_site/**/*.html'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  jekyll-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Install dependencies
        run: bundle install
      - name: Build Jekyll site
        run: bundle exec jekyll build
